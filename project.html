<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDeck Builder Pro</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #1e2640;
            --bg-deck: #131a30;
            --accent-neon: #ffcb05; /* Classic Pokemon Gold */
            --accent-blue: #3b4cca;
            --text-light: #f1f5f9;
            --text-muted: #64748b;
            
            /* Pokemon Types Color Palette */
            --type-grass: #48d0b0;
            --type-fire: #fb6c6c;
            --type-water: #76bdfe;
            --type-bug: #9fa424;
            --type-normal: #a8a878;
            --type-poison: #a040a0;
            --type-electric: #ffd86f;
            --type-ground: #e0c068;
            --type-fairy: #ee99ac;
            --type-fighting: #c03028;
            --type-psychic: #f85888;
            --type-rock: #b8a038;
            --type-ghost: #705898;
            --type-ice: #98d8d8;
            --type-dragon: #7038f8;
            --type-dark: #705848;
            --type-steel: #b8b8d0;
            --type-flying: #a890f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Navigation */
        header {
            background: linear-gradient(135deg, #111827 0%, var(--bg-deck) 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-neon);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--accent-neon);
            text-shadow: 0 0 10px rgba(255, 203, 5, 0.4);
        }

        header h1 span {
            color: #fff;
        }

        /* Main Workspace Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            padding: 30px;
            flex-grow: 1;
        }

        @media (min-width: 1024px) {
            .workspace {
                grid-template-columns: 3fr 1.3fr;
            }
        }

        /* Search Engine Area */
        .search-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-bar-container {
            display: flex;
            gap: 12px;
            background: var(--bg-deck);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-bar-container input {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar-container input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(59, 76, 202, 0.5);
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* Card Catalog Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            min-height: 400px;
        }

        .poke-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .poke-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            border-color: var(--accent-neon);
        }

        .card-img-wrap {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 140px;
        }

        .card-img-wrap img {
            max-width: 120px;
            filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.5));
        }

        .poke-id {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            position: absolute;
            top: 15px;
            left: 15px;
        }

        .poke-name {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: capitalize;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .types-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .type-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn-add {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Deck List Sidebar Panel */
        .deck-sidebar {
            background: var(--bg-deck);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            max-height: calc(100vh - 140px);
            position: sticky;
            top: 30px;
        }

        .deck-header {
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deck-counter {
            background: var(--accent-neon);
            color: var(--bg-main);
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .deck-items-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .deck-items-list::-webkit-scrollbar {
            width: 5px;
        }
        .deck-items-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .deck-item {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--accent-blue);
            animation: slideIn 0.2s ease-out;
        }

        .deck-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .deck-item img {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        .deck-item-info h4 {
            text-transform: capitalize;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .deck-item-qty {
            font-size: 0.8rem;
            color: var(--accent-neon);
            font-weight: 700;
        }

        .btn-remove {
            background: rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            border: 1px solid rgba(244, 63, 94, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: #f43f5e;
            color: white;
        }

        /* System Notifications/State Feedback */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--accent-neon);
            font-weight: 600;
            font-size: 1.2rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>PokeDeck<span>Builder</span></h1>
        <div style="font-size: 0.9rem; color: var(--text-muted)">TCG Engine v2.0</div>
    </header>

    <div class="workspace">
        
        <div class="search-section">
            <div class="search-bar-container">
                <input type="text" id="searchInput" placeholder="Search Pokemon by name or national ID index...">
                <button class="btn" id="searchBtn">Find Pokemon</button>
                <button class="btn" id="clearBtn" style="background: rgba(255,255,255,0.05); color: white;">Reset</button>
            </div>

            <div class="catalog-grid" id="catalogGrid">
                </div>
        </div>

        <div class="deck-sidebar">
            <div class="deck-header">
                <h2>Active Deck</h2>
                <span class="deck-counter" id="deckCounter">0 / 60</span>
            </div>
            
            <ul class="deck-items-list" id="deckItemsList">
                </ul>
        </div>

    </div>

<script>
    // App Configuration State
    const AppState = {
        deck: [], // Holds card configurations { id, name, sprite, types, count }
        maxDeckSize: 60,
        maxSameCard: 4,
        basePokemonList: [
            "bulbasaur", "ivysaur", "venusaur", "charmander", "charmeleon", "charizard",
            "squirtle", "wartortle", "blastoise", "pikachu", "raichu", "eevee", 
            "gengar", "mewtwo", "lucario", "greninja", "lugia", "rayquaza"
        ]
    };

    // DOM References
    const catalogGrid = document.getElementById('catalogGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const deckItemsList = document.getElementById('deckItemsList');
    const deckCounter = document.getElementById('deckCounter');

    // Run Initialization Runtime
    window.addEventListener('DOMContentLoaded', () => {
        loadDefaultCatalog();
        setupEvents();
    });

    function setupEvents() {
        searchBtn.addEventListener('click', executeSearch);
        clearBtn.addEventListener('click', () => {
            searchInput.value = "";
            loadDefaultCatalog();
        });
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeSearch();
        });
    }

    // Load default popular cards pool to keep interface loaded beautifully
    async function loadDefaultCatalog() {
        catalogGrid.innerHTML = `<div class="loading">Sourcing Pokemon Profiles from PokéAPI...</div>`;
        try {
            const fetchPromises = AppState.basePokemonList.map(name => 
                fetch(`https://pokeapi.co/api/v2/pokemon/${name}`).then(res => res.json())
            );
            const pokemons = await Promise.all(fetchPromises);
            renderCatalog(pokemons);
        } catch (error) {
            catalogGrid.innerHTML = `<div class="loading" style="color:#f43f5e">Failed connecting to PokéAPI proxy pipeline.</div>`;
        }
    }

    // Target Precise Entity Match Lookups
    async function executeSearch() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;

        catalogGrid.innerHTML = `<div class="loading">Searching Database Registry...</div>`;
        try {
            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
            if (!response.ok) throw new Error("Not found");
            const data = await response.json();
            renderCatalog([data]);
        } catch (err) {
            catalogGrid.innerHTML = `<div class="loading" style="color:#f43f5e">No results found for "${query}". Check spelling or ID range.</div>`;
        }
    }

    function renderCatalog(pokemonList) {
        catalogGrid.innerHTML = "";
        pokemonList.forEach(poke => {
            const card = document.createElement('div');
            card.className = 'poke-card';
            
            // Format ID representation 
            const formattedId = `#${String(poke.id).padStart(3, '0')}`;
            const officialSprite = poke.sprites.other['official-artwork'].front_default || poke.sprites.front_default;
            const primaryType = poke.types[0].type.name;

            // Generate Type Badges HTML Element markup
            const typesHTML = poke.types.map(t => 
                `<span class="type-badge" style="background-color: var(--type-${t.type.name})">${t.type.name}</span>`
            ).join('');

            card.innerHTML = `
                <span class="poke-id">${formattedId}</span>
                <div class="card-img-wrap">
                    <img src="${officialSprite}" alt="${poke.name}">
                </div>
                <div class="poke-name">${poke.name}</div>
                <div class="types-container">
                    ${typesHTML}
                </div>
                <button class="btn btn-add" onclick="addCardToDeck(${poke.id}, '${poke.name}', '${poke.sprites.front_default}')">Add to Deck</button>
            `;
            catalogGrid.appendChild(card);
        });
    }

    // Deck Business Rule Validation Mechanics 
    window.addCardToDeck = function(id, name, sprite) {
        const currentTotal = AppState.deck.reduce((sum, item) => sum + item.count, 0);
        
        if (currentTotal >= AppState.maxDeckSize) {
            alert(`Deck state validation failure: Maximum deck size limit (${AppState.maxDeckSize} cards) reached.`);
            return;
        }

        const existingCard = AppState.deck.find(item => item.id === id);

        if (existingCard) {
            if (existingCard.count >= AppState.maxSameCard) {
                alert(`TCG rule constraint: You cannot have more than ${AppState.maxSameCard} copies of "${name}" in one deck.`);
                return;
            }
            existingCard.count++;
        } else {
            AppState.deck.push({ id, name, sprite, count: 1 });
        }

        updateDeckUI();
    };

    window.removeCardFromDeck = function(id) {
        const targetIndex = AppState.deck.findIndex(item => item.id === id);
        if (targetIndex === -1) return;

        if (AppState.deck[targetIndex].count > 1) {
            AppState.deck[targetIndex].count--;
        } else {
            AppState.deck.splice(targetIndex, 1);
        }

        updateDeckUI();
    };

    function updateDeckUI() {
        deckItemsList.innerHTML = "";
        let totalCards = 0;

        AppState.deck.forEach(item => {
            totalCards += item.count;
            const li = document.createElement('li');
            li.className = 'deck-item';
            li.innerHTML = `
                <div class="deck-item-left">
                    <img src="${item.sprite}" alt="${item.name}">
                    <div class="deck-item-info">
                        <h4>${item.name}</h4>
                        <span class="deck-item-qty">Copies: ${item.count}</span>
                    </div>
                </div>
                <button class="btn-remove" onclick="removeCardFromDeck(${item.id})">Remove</button>
            `;
            deckItemsList.appendChild(li);
        });

        deckCounter.textContent = `${totalCards} / ${AppState.maxDeckSize}`;
        
        // Context Alert indicators changes on full deck limits
        if (totalCards === AppState.maxDeckSize) {
            deckCounter.style.backgroundColor = "#10b981";
            deckCounter.style.color = "#fff";
        } else {
            deckCounter.style.backgroundColor = "var(--accent-neon)";
            deckCounter.style.color = "var(--bg-main)";
        }
    }
</script>
</body>
</html>
